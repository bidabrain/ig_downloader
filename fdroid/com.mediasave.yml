Summary: Download photos and videos from social media

Description: |-
  MediaSave lets you download photos and videos from Instagram, X (Twitter),
  RedNote (小红书 / XiaoHongShu) and Douyin (抖音) without watermarks.

  Features:

  * Download photos, videos and carousels from Instagram posts and reels
  * Download photos, videos and GIFs from X (Twitter)
  * Download photos and videos from RedNote notes
  * Download videos from Douyin
  * Persistent login — log in once per platform, session is saved
  * Share a URL directly from any app to trigger instant download

AntiFeatures:
  NonFreeNet:
    en-US: Accesses Instagram, X (Twitter), RedNote and Douyin — non-free network services.

